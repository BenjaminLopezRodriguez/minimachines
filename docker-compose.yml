services:
  postgres:
    image: postgres:16-alpine
    container_name: minimachines-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: minimachines
    volumes:
      - minimachines_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d minimachines"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  minimachines_pgdata:
